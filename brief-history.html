<!DOCTYPE html>
<html lang="en" x-data="briefHistory()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief History | Sales Saathi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./src/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        darkBg: '#09090b',
                        darkCard: '#18181b',
                        darkBorder: 'rgba(255,255,255,0.08)',
                        brandIndigo: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-200 font-sans antialiased min-h-screen pt-20">

    <!-- Navbar Minimal -->
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-[#09090b]/80 backdrop-blur-xl border-b border-slate-200 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="dashboard.html" class="flex items-center gap-2 outline-none group text-sm font-bold text-slate-500 hover:text-slate-900 dark:text-zinc-400 dark:hover:text-white transition-colors">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Dashboard
            </a>
            <div class="flex items-center gap-4">
                <h1 class="text-lg font-extrabold text-slate-900 dark:text-white">Brief History</h1>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-show="!loading" x-cloak>
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Your Generated Briefs</h2>
                <p class="text-slate-500 dark:text-zinc-400 font-medium">Review and export intelligence from past queries.</p>
            </div>
            <div class="w-full sm:w-auto relative">
                <svg class="w-5 h-5 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" x-model="search" placeholder="Search companies..." class="w-full sm:w-72 pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-darkCard border border-slate-200 dark:border-darkBorder focus:ring-2 focus:ring-brandIndigo outline-none font-medium transition-shadow">
            </div>
        </div>

        <!-- Empty State -->
        <div x-show="filteredBriefs.length === 0" class="flex flex-col items-center justify-center p-16 text-center border-2 border-dashed border-slate-200 dark:border-darkBorder rounded-2xl bg-white/50 dark:bg-darkCard/50">
            <div class="w-16 h-16 rounded-full bg-brandIndigo/10 flex items-center justify-center text-brandIndigo mb-4">
                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">No briefs found</h3>
            <p class="text-slate-500 dark:text-zinc-400 font-medium mb-6">You haven't generated any intelligence briefs yet, or none match your search.</p>
            <a href="dashboard.html" class="px-6 py-2.5 rounded-xl bg-brandIndigo text-white font-bold shadow-md hover:bg-indigo-500 transition-colors">Generate Your First Brief</a>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="brief in filteredBriefs" :key="brief.id">
                <div class="bg-white dark:bg-darkCard border border-slate-200 dark:border-darkBorder rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all duration-300 group flex flex-col h-full">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 rounded-xl bg-slate-50 dark:bg-darkBg border border-slate-200 dark:border-white/5 flex items-center justify-center font-bold text-brandIndigo text-lg uppercase" x-text="brief.company.substring(0,2)"></div>
                        <span class="px-2.5 py-1 rounded-md bg-slate-100 dark:bg-white/10 text-slate-600 dark:text-zinc-300 text-xs font-bold uppercase tracking-wider" x-text="window.formatIST(brief.meeting_datetime || brief.created_at)"></span>
                    </div>
                    
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-1" x-text="brief.company"></h3>
                    <p class="text-sm font-medium text-slate-500 dark:text-zinc-400 mb-4 line-clamp-1"><span x-text="brief.prospect_name"></span> • <span x-text="brief.role"></span></p>
                    
                    <div class="mt-auto pt-6 border-t border-slate-100 dark:border-white/5 flex gap-3">
                        <a :href="'brief-result.html?id=' + brief.id" class="flex-1 py-2.5 rounded-xl bg-brandIndigo text-white text-center text-sm font-bold shadow-md hover:bg-indigo-500 transition-colors">Open Brief</a>
                        <button @click="deleteBrief(brief.id)" class="px-4 py-2.5 rounded-xl border border-rose-200 dark:border-rose-500/30 text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-500/10 font-bold transition-colors" title="Delete">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Global Loading -->
    <div x-show="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-darkBg">
        <svg class="animate-spin w-8 h-8 text-brandIndigo" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('briefHistory', () => ({
                darkMode: true,
                loading: true,
                briefs: [],
                search: '',
                
                get filteredBriefs() {
                    if (this.search === '') return this.briefs;
                    const q = this.search.toLowerCase();
                    return this.briefs.filter(b => b.company.toLowerCase().includes(q) || b.prospect_name.toLowerCase().includes(q));
                },

                async init() {
                    setTimeout(async () => {
                        try {
                            const { db, supabase, isSupabaseConfigured } = await import('./src/db.js');
                            
                            let user = null;
                            if (isSupabaseConfigured) {
                                const { data } = await supabase.auth.getSession();
                                user = data?.session?.user;
                            } else {
                                const mockSession = localStorage.getItem('sales_saathi_mock_session');
                                if (mockSession) {
                                    user = JSON.parse(mockSession);
                                }
                            }

                            if (!user) {
                                window.location.href = 'auth.html';
                                return;
                            }

                            this.briefs = await db.getUserBriefs(user.id);
                        } catch (err) {
                            console.error("Failed to load briefs:", err);
                        } finally {
                            this.loading = false;
                        }
                    }, 150);
                },

                async deleteBrief(id) {
                    if(confirm("Are you sure you want to delete this brief?")) {
                        const { db } = await import('./src/db.js');
                        await db.deleteBrief(id);
                        this.briefs = this.briefs.filter(b => b.id !== id);
                    }
                }
            }));
        });
    </script>
</body>
</html>
